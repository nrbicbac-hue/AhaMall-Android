name: Build Aha Mall APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - run: gradle assembleDebug

      - run: cp app/build/outputs/apk/debug/app-debug.apk AhaMall-1.0.0.apk

      - uses: actions/upload-artifact@v4
        with:
          name: AhaMall-APK
          path: AhaMall-1.0.0.apk

      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.0.0 >/dev/null 2>&1; then
            gh release upload v1.0.0 AhaMall-1.0.0.apk --clobber
          else
            gh release create v1.0.0 AhaMall-1.0.0.apk --title "아하몰 v1.0.0" --notes "아하몰 안드로이드 설치 파일"
          fi
